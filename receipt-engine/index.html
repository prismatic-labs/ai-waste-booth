<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:title" content="Get Your AI Waste Receipt">
  <meta property="og:description" content="Find out your AI waste pattern - and get a useful next step.">
  <meta property="og:image" content="https://prismatic-labs.github.io/ai-waste-booth/share/cards/ai-waste-receipt.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <title>AI Waste Receipt — Prismatic Labs</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ───────────────────────── SCREEN 1: FORK ───────────────────────── -->
<div id="screen-fork" class="screen active">
  <div class="screen-inner">
    <div class="header-brand">
      <a class="brand-mark" href="https://prismaticlabs.ai" target="_blank" rel="noopener">◈ PRISMATIC LABS</a>
    </div>
    <div class="fork-hero">
      <h1 class="fork-title">AI WASTE<br>RECEIPT</h1>
      <p class="fork-subtitle">Get a diagnosis in under a minute.</p>
    </div>
    <p class="fork-question">Which one is you?</p>
    <div class="fork-tiles">
      <button class="fork-tile" data-fork="casual">
        <span class="tile-icon">💬</span>
        <span class="tile-label">I use AI tools<br><em>ChatGPT / Claude / Copilot</em></span>
      </button>
      <button class="fork-tile" data-fork="builder">
        <span class="tile-icon">⚙️</span>
        <span class="tile-label">I'm building something<br><em>that makes API calls for users</em></span>
      </button>
    </div>
  </div>
</div>

<!-- ───────────────────── SCREEN 2a: CASUAL QUIZ ─────────────────────── -->
<div id="screen-casual" class="screen">
  <div class="screen-inner">
    <div class="quiz-progress">
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      <span id="progress-label" class="progress-label">Q 0 / 4</span>
    </div>
    <div id="quiz-container" class="quiz-container">
      <!-- injected by quiz.js -->
    </div>
  </div>
</div>

<!-- ───────────────────── SCREEN 2b: BUILDER FLOW ────────────────────── -->
<div id="screen-builder" class="screen">
  <div class="screen-inner">
    <div class="quiz-progress">
      <div class="progress-bar"><div id="builder-progress-fill" class="progress-fill"></div></div>
      <span id="builder-progress-label" class="progress-label">Step 1 / 2</span>
    </div>
    <div id="builder-container" class="quiz-container">
      <!-- injected by app.js -->
    </div>
  </div>
</div>

<!-- ─────────────────── SCREEN 3: RECEIPT REVEAL ─────────────────────── -->
<div id="screen-receipt" class="screen">
  <div class="screen-inner receipt-screen-inner">

    <!-- 1. Social card preview -->
    <div id="social-card-container"></div>

    <!-- 2. Share / save buttons -->
    <div class="receipt-share-actions">
      <button id="btn-share-card" class="btn-primary">Share result</button>
      <button id="btn-save-card" class="btn-secondary">Save image</button>
      <a id="btn-linkedin" class="btn-linkedin" href="#" target="_blank" rel="noopener">Share on LinkedIn</a>
      <p class="screenshot-fallback">Can't save? Screenshot this receipt.</p>
    </div>

    <!-- 3. Personal receipt -->
    <div id="receipt-container" class="receipt-container"></div>

    <!-- 4. CTA (injected by receipt.js based on path) -->
    <div id="receipt-cta-actions" class="receipt-cta-actions"></div>

    <!-- 5. Footer -->
    <div class="receipt-footer-actions">
      <button id="btn-restart" class="btn-ghost">Start again</button>
    </div>

  </div>
</div>

<!-- ──────────────────── CANVAS (off-screen, share card) ─────────────── -->
<canvas id="share-canvas" style="display:none"></canvas>

<!-- ──────────────────────────── SCRIPTS ─────────────────────────────── -->
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  }
</script>
<script src="vendor/qrcode.min.js"></script>
<script src="data.js"></script>
<script src="config.js"></script>
<script src="quiz.js"></script>
<script src="diagnosis.js"></script>
<script src="receipt.js"></script>
<script src="share-card.js"></script>
<script src="booth-mode.js"></script>
<script src="app.js"></script>

</body>
</html>
